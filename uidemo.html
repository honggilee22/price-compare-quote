<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>가격 비교</title>
    <style>
      :root {
        --bg-1: #f7fbff;
        --bg-2: #eaf3ff;
        --bg-3: #ffece6;
        --ink: #1f2937;
        --muted: #6b7280;
        --line: #e5eaf0;
        --line-width: 2px;
        --card: #ffffff;
        --accent: #ff6b6b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Pretendard", "SUIT", "Noto Sans KR", "Apple SD Gothic Neo",
          "Malgun Gothic", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 10% 15%, #ffffff 0%, #ffffff00 45%),
          radial-gradient(circle at 90% 10%, #ffffffcc 0%, #ffffff00 50%),
          linear-gradient(140deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
      }

      .canvas {
        width: 2000px;
        height: 1200px;
        margin: 0 auto;
        padding: 20px 28px;
        position: relative;
        display: grid;
        grid-template-rows: auto auto auto;
        gap: 12px;
        align-content: start;
      }

      .menu {
        display: flex;
        align-items: center;
        height: 44px;
        background: var(--card);
        border: var(--line-width) solid var(--line);
        border-radius: 12px;
        overflow: hidden;
      }

      .menu button {
        border: none;
        background: transparent;
        padding: 0 16px;
        height: 100%;
        font-size: 14px;
        font-weight: 600;
        color: var(--muted);
      }

      .menu button.active {
        color: #ffffff;
        background: linear-gradient(135deg, #ff7f7f, #ffb18a);
      }

      .divider {
        width: var(--line-width);
        height: 100%;
        background: var(--line);
      }

      .summary {
        height: 44px;
        border: var(--line-width) solid var(--line);
        border-radius: 12px;
        background: var(--card);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        font-size: 18px;
        font-weight: 700;
        color: var(--ink);
      }

      .export-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 10px;
      }

      .export-action {
        height: 28px;
        padding: 0 10px;
        border-radius: 8px;
        border: var(--line-width) solid var(--line);
        background: #ffffff;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }

      .summary-point {
        color: var(--accent);
        font-weight: 800;
      }

      .summary-label-discount {
        color: var(--accent);
        font-weight: 700;
      }

      .summary-point-extra,
      .summary-label-extra {
        color: #5b8def;
        font-weight: 800;
      }

      .plans {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        align-items: stretch;
      }

      .plan {
        background: var(--card);
        border: var(--line-width) solid var(--line);
        border-radius: 16px;
        padding: 12px;
        display: grid;
        gap: 10px;
        align-content: start;
      }

      .plan-head {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 12px;
      }

      .plan-title {
        font-size: 18px;
        font-weight: 700;
      }

      .total-box {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 6px 10px;
        border-radius: 10px;
        border: var(--line-width) solid var(--line);
        background: #f7f9fc;
      }

      .total-label {
        color: var(--muted);
        font-size: 14px;
      }

      .total-value {
        font-size: 18px;
        font-weight: 700;
      }

      .add-btn {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        border: var(--line-width) solid var(--line);
        background: #ffffff;
        font-size: 18px;
        font-weight: 700;
        color: var(--ink);
      }

      .plan-actions {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .promo-btn {
        height: 34px;
        padding: 0 12px;
        border-radius: 8px;
        border: var(--line-width) solid var(--line);
        background: #ffffff;
        font-size: 12px;
        font-weight: 700;
        color: var(--ink);
      }

      .promo-btn.is-active {
        background: #fff0ea;
        border-color: #ffd0c0;
        color: #c2412d;
      }

      .promo-btn:disabled {
        background: #f2f4f7;
        color: var(--muted);
      }

      .prepay {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: var(--muted);
      }

      .check {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 8px;
        border-radius: 8px;
        border: var(--line-width) solid var(--line);
        background: #ffffff;
        color: var(--ink);
      }

      .check input {
        accent-color: var(--accent);
      }

      .check span {
        font-weight: 600;
      }

      .table {
        display: grid;
        gap: 4px;
      }

      .row {
        display: grid;
        grid-template-columns: 1.4fr 1fr 0.8fr 1fr;
        gap: 8px;
        align-items: center;
        padding: 6px 8px;
        border-radius: 8px;
        font-size: 13px;
        text-align: right;
      }

      .row.header {
        background: #f5f7fb;
        color: var(--muted);
        border: var(--line-width) solid var(--line);
        font-weight: 600;
      }

      .row.data {
        border: var(--line-width) solid var(--line);
        background: #ffffff;
        position: relative;
      }

      .row.promo {
        background: #fff8f3;
      }

      .cell {
        width: 100%;
      }

      input.cell {
        height: 26px;
        border: var(--line-width) solid var(--line);
        border-radius: 6px;
        padding: 0 8px;
        font-size: 13px;
        background: #ffffff;
        color: var(--ink);
        text-align: right;
      }

      .row-total {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
      }

      .promo-label {
        text-align: left;
        font-weight: 600;
        color: var(--muted);
        justify-self: start;
      }

      .summary-promo-note {
        font-size: 0.85em;
      }

      .total-promo-note {
        display: block;
        font-size: 11px;
        color: var(--muted);
        font-weight: 600;
        margin-top: 2px;
      }

      .row-total-value {
        font-weight: 600;
        color: var(--accent);
      }

      .model-slot {
        display: grid;
        gap: 6px;
      }

      .model-slot .model,
      .model-slot .chungho-select {
        width: 100%;
        height: 34px;
        border-radius: 8px;
        border: var(--line-width) solid var(--line);
        padding: 0 10px;
        font-size: 12px;
        box-sizing: border-box;
        background: #ffffff;
        color: var(--ink);
      }

      .model-slot .chungho-select[hidden],
      .model-slot .model[hidden] {
        display: none;
      }

      .remarks-field {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .remarks-input {
        width: 100%;
        min-height: 96px;
        resize: vertical;
        border-radius: 10px;
        border: var(--line-width) solid var(--line);
        padding: 10px 12px;
        box-sizing: border-box;
        font: inherit;
        color: var(--ink);
        background: #ffffff;
      }

      .remarks-help {
        font-size: 12px;
        color: var(--muted);
      }

      .remarks-help__product {
        color: #0563c1;
        font-weight: 700;
        text-decoration: underline;
      }

      .row-delete {
        height: 22px;
        padding: 0 8px;
        border-radius: 6px;
        border: var(--line-width) solid var(--line);
        background: #ffffff;
        color: var(--muted);
        font-size: 11px;
        font-weight: 600;
      }

      .model-suggestions {
        position: absolute;
        z-index: 30;
        display: none;
        flex-direction: column;
        gap: 4px;
        background: #ffffff;
        border: var(--line-width) solid var(--line);
        border-radius: 10px;
        padding: 6px;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
        max-height: 240px;
        overflow: auto;
      }

      .model-suggestion {
        border: 0;
        background: transparent;
        text-align: left;
        display: grid;
        gap: 2px;
        padding: 6px 8px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
        color: var(--ink);
      }

      .model-suggestion:hover {
        background: #f5f7fb;
      }

      .model-suggestion .meta {
        color: var(--muted);
        font-weight: 600;
      }

      .resume-modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 200;
      }

      .resume-modal.is-open {
        display: flex;
      }

      .resume-modal__backdrop {
        position: absolute;
        inset: 0;
        background: rgba(15, 23, 42, 0.35);
        backdrop-filter: blur(2px);
      }

      .resume-modal__content {
        position: relative;
        z-index: 1;
        width: min(92vw, 420px);
        background: #ffffff;
        border-radius: 16px;
        border: var(--line-width) solid var(--line);
        padding: 18px;
        display: grid;
        gap: 16px;
        text-align: center;
      }

      .resume-modal__title {
        font-size: 16px;
        font-weight: 700;
        color: var(--ink);
        line-height: 1.5;
      }

      .resume-modal__actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .resume-btn {
        height: 38px;
        border-radius: 10px;
        border: var(--line-width) solid var(--line);
        background: #ffffff;
        color: var(--ink);
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
      }

      .resume-btn.primary {
        background: linear-gradient(135deg, #ff7f7f, #ffb18a);
        color: #ffffff;
        border: none;
      }

      .price-view,
      .product-view,
      .quote-view,
      .guide-view {
        display: none;
      }

      .canvas.view-price .price-view,
      .canvas.view-product .product-view,
      .canvas.view-guide .guide-view {
        display: block;
      }

      .canvas.view-quote .quote-view {
        display: grid;
      }

      .product-view {
        position: relative;
        min-height: 720px;
      }

      .product-frame {
        width: 100%;
        height: 100%;
        border: var(--line-width) solid var(--line);
        border-radius: 12px;
        background: #ffffff;
      }

      .guide-view {
        position: relative;
        height: 100vh;
        min-height: 720px;
      }

      .canvas.view-guide {
        padding: 0;
        border: none;
        background: transparent;
        width: 100%;
        max-width: none;
        height: auto;
        margin: 0;
      }

      .canvas.view-guide .product-frame {
        height: 100%;
        border: none;
        border-radius: 0;
      }

      .quote-view {
        border: var(--line-width) solid var(--line);
        border-radius: 16px;
        background: var(--card);
        padding: 16px;
        gap: 14px;
      }

      .quote-view__section {
        display: grid;
        gap: 6px;
      }

      .quote-view__title {
        font-size: 14px;
        font-weight: 700;
        color: var(--muted);
      }

      .quote-view__actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      .quote-send {
        height: 38px;
        padding: 0 16px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, #ff7f7f, #ffb18a);
        color: #ffffff;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
      }

      .quote-refresh {
        height: 38px;
        padding: 0 16px;
        border-radius: 10px;
        border: var(--line-width) solid var(--line);
        background: #ffffff;
        color: var(--ink);
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
      }

      .guide-view {
        border: none;
        border-radius: 0;
        background: transparent;
        padding: 0;
        font-size: 14px;
        color: var(--muted);
      }

      .quote {
        border: var(--line-width) solid var(--line);
        border-radius: 12px;
        background: var(--card);
        padding: 10px 14px;
        display: grid;
        grid-template-columns: 1.2fr 0.8fr 0.9fr 1.4fr;
        gap: 12px;
        align-items: center;
        font-size: 13px;
      }

      .quote-field {
        display: grid;
        gap: 6px;
      }

      .quote-label {
        color: var(--muted);
        font-weight: 600;
        font-size: 12px;
      }

      .quote-input {
        height: 30px;
        border: var(--line-width) solid var(--line);
        border-radius: 8px;
        padding: 0 10px;
        font-size: 13px;
        background: #ffffff;
        color: var(--ink);
      }

      .quote-input-group {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .quote-suffix {
        height: 30px;
        padding: 0 10px;
        border-radius: 8px;
        border: var(--line-width) solid var(--line);
        background: #f7f9fc;
        color: var(--muted);
        font-weight: 600;
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        white-space: nowrap;
      }

      .mode-switch {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }

      .mode-switch button {
        height: 34px;
        padding: 0 12px;
        border-radius: 10px;
        border: var(--line-width) solid var(--line);
        background: #ffffff;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .mode-switch button.active {
        background: linear-gradient(135deg, #ff7f7f, #ffb18a);
        color: #ffffff;
      }

      .canvas.mode-single .plan[data-plan="2"] {
        display: none;
      }

      .canvas.mode-single .plans {
        grid-template-columns: 1fr;
      }

      .job-status {
        display: none;
        margin-top: 10px;
        padding: 12px 14px;
        border-radius: 10px;
        border: var(--line-width) solid var(--line);
        background: #ffffff;
        font-size: 13px;
        font-weight: 700;
      }

      .job-status.is-visible {
        display: block;
      }

      .job-status.is-error {
        border-color: #fecaca;
        background: #fff1f2;
        color: #b91c1c;
      }

      .job-status.is-success {
        border-color: #bbf7d0;
        background: #f0fdf4;
        color: #166534;
      }
    </style>
  </head>

      <div class="menu">

        <span class="divider"></span>
        <button type="button" data-view="quote">견적서 발송</button>
      </div>

      <div class="price-view">
        <div class="mode-switch" aria-label="견적 모드">
          <button class="active" type="button" data-mode="compare">비교견적서</button>
          <button type="button" data-mode="single">단일견적서</button>

        <div class="summary" id="summary">

        <div class="quote" id="flow-section-info">

        <label class="remarks-field">
          <span class="quote-label">특이사항</span>
          <span class="remarks-help">
            <span class="remarks-help__product">@상품명</span>
            클릭하시면 카달로그 페이지로 이동 합니다
          </span>
          <textarea
            class="remarks-input"
            id="quote-remarks"
            placeholder="견적서에 표시할 특이사항을 입력하세요."
          >@상품명 클릭하시면 카달로그 페이지로 이동 합니다</textarea>
        </label>
        <div class="export-actions" id="flow-section-export">
          <button class="export-action" type="button" id="reset-form">초기화</button>
          <button class="export-action" type="button" id="export-csv">PDF 만들기</button>
        </div>
        <div id="job-status" class="job-status" role="status" aria-live="polite"></div>
        <div
          id="pdf-progress"
          style="position:fixed;inset:0;background:rgba(15,23,42,.46);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px;"
        >
          <div style="width:min(420px,100%);background:#fff;border-radius:18px;padding:24px;box-shadow:0 24px 80px rgba(15,23,42,.24);">
            <div id="pdf-progress-title" style="font-size:20px;font-weight:700;color:#0f172a;">PDF 생성 중</div>
            <div style="margin-top:16px;height:12px;background:#e2e8f0;border-radius:999px;overflow:hidden;">
              <div id="pdf-progress-bar" style="width:8%;height:100%;background:linear-gradient(90deg,#0f766e,#14b8a6);transition:width .35s ease;"></div>
            </div>
            <div id="pdf-progress-text" style="margin-top:14px;font-size:14px;color:#334155;">요청을 전송하는 중입니다.</div>
            <div id="pdf-progress-elapsed" style="margin-top:6px;font-size:13px;color:#64748b;">0초 경과</div>
          </div>
        </div>
      </div>

      <div class="guide-view">
        <iframe
          class="product-frame"
          id="guide-frame"
          title="절차안내"
          loading="lazy"
        ></iframe>
      </div>

      <div class="product-view">
        <iframe
          class="product-frame"
          id="product-frame"
          title="제품정보"
          loading="lazy"
        ></iframe>
      </div>

      <div class="quote-view">
        <div class="quote-view__section">
          <div class="quote-view__title">발송 정보</div>
          <div id="quote-summary"></div>
        </div>
        <div class="quote-view__actions">
          <button class="quote-send" type="button" id="quote-send">견적서 발송</button>
        </div>
        <div id="quote-job-status" class="job-status" role="status" aria-live="polite"></div>
      </div>

    <div class="resume-modal" id="resume-modal" aria-hidden="true">
      <div class="resume-modal__backdrop"></div>
      <div class="resume-modal__content" role="dialog" aria-modal="true">
        <div class="resume-modal__title" id="resume-message"></div>
        <div class="resume-modal__actions">
          <button class="resume-btn primary" type="button" id="resume-yes">네</button>
          <button class="resume-btn" type="button" id="resume-no">아니요</button>
        </div>
      </div>
    </div>

    <script>
      const format = new Intl.NumberFormat("ko-KR");
      const CHUNGHO_CATALOG = {
        "정수기": [
          { name: "슈퍼아이스트리", url: "https://planner-power.com/catalog/prod_detail.php?idx=104&pp=2&rp=16" },
          { name: "700", url: "https://planner-power.com/catalog/prod_detail.php?idx=110&pp=2&rp=16" },
          { name: "550", url: "https://planner-power.com/catalog/prod_detail.php?idx=71&pp=2&rp=16" },
          { name: "토타max", url: "https://planner-power.com/catalog/prod_detail.php?idx=165&pp=1&rp=8" },
          { name: "토타", url: "https://planner-power.com/catalog/prod_detail.php?idx=108&pp=1&rp=12" },
        ],
        "공기청정기": [
          { name: "서밋", url: "https://planner-power.com/catalog/prod_detail.php?idx=173&pp=2&rp=24" },
          { name: "디오", url: "https://planner-power.com/catalog/prod_detail.php?idx=139&pp=1&rp=14" },
        ],
        "비데": [
          { name: "B400", url: "https://planner-power.com/catalog/prod_detail.php?idx=164&pp=1&rp=12" },
          { name: "B350", url: "https://planner-power.com/catalog/prod_detail.php?idx=95&pp=2&rp=24" },
        ],
        "변기": [
          { name: "루컷", url: "https://planner-power.com/catalog/prod_detail.php?idx=140&pp=1&rp=2" },
        ],
      };

      function parseNumber(value) {
        const num = String(value || "").replace(/[^0-9]/g, "");
        return Number(num || 0);
      }

      function formatWon(value) {
        return `${format.format(value)}원`;
      }

      function normalizeModel(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/[^a-z0-9가-힣]/g, "");
      }

      function buildCatalogEntries(source) {
        const entries = [];
        if (!source || typeof source !== "object") return entries;
        Object.values(source).forEach((items) => {
          if (!Array.isArray(items)) return;
          items.forEach((item) => {
            const modelCode = String(item.model_code || "").trim();
            const modelName = String(item.model_name || "").trim();
            const priceValue = parseNumber(item.price);
            if (!priceValue) return;
            if (!modelCode && !modelName) return;
            entries.push({
              modelCode,
              modelName,
              priceType: String(item.price_type || "").trim(),
              price: priceValue,
              codeKey: normalizeModel(modelCode),
              nameKey: normalizeModel(modelName),
            });
          });
        });
        return entries;
      }

      const catalogEntries = buildCatalogEntries(window.catalogData || {});
      const MAX_SUGGESTIONS = 20;

      function isChunghoPlan(plan) {
        if (!plan) return false;
        const mode = getActiveMode();
        const planId = plan.dataset.plan;
        return mode === "single" ? planId === "1" : planId === "2";
      }

      function populateChunghoCategories(select, selectedCategory = "") {
        if (!select) return;
        const options = ['<option value="">대분류 선택</option>'];
        Object.keys(CHUNGHO_CATALOG).forEach((category) => {
          const selected = category === selectedCategory ? " selected" : "";
          options.push(`<option value="${category}"${selected}>${category}</option>`);
        });
        select.innerHTML = options.join("");
      }

      function populateChunghoProducts(select, category, selectedProduct = "") {
        if (!select) return;
        const items = CHUNGHO_CATALOG[category] || [];
        const options = ['<option value="">제품 선택</option>'];
        items.forEach((item) => {
          const selected = item.name === selectedProduct ? " selected" : "";
          options.push(`<option value="${item.name}" data-url="${item.url}"${selected}>${item.name}</option>`);
        });
        select.innerHTML = options.join("");
        select.disabled = !category;
      }

      function findChunghoSelection(modelName) {
        const target = String(modelName || "").trim();
        if (!target) return null;
        for (const [category, items] of Object.entries(CHUNGHO_CATALOG)) {
          const found = items.find((item) => item.name === target);
          if (found) {
            return { category, product: found.name };
          }
        }
        return null;
      }

      function syncChunghoControls(row, preserveValue = true) {
        if (!row) return;
        const plan = row.closest(".plan");
        const modelInput = row.querySelector(".model");
        const categorySelect = row.querySelector(".chungho-category");
        const productSelect = row.querySelector(".chungho-product");
        if (!plan || !modelInput || !categorySelect || !productSelect) return;

        const enabled = isChunghoPlan(plan);
        if (enabled) {
          const selection = preserveValue ? findChunghoSelection(modelInput.value) : null;
          populateChunghoCategories(categorySelect, selection?.category || "");
          populateChunghoProducts(productSelect, selection?.category || "", selection?.product || "");
          categorySelect.hidden = false;
          productSelect.hidden = false;
          modelInput.hidden = true;
          if (selection) {
            modelInput.value = selection.product;
          } else if (!preserveValue) {
            modelInput.value = "";
            productSelect.value = "";
          }
        } else {
          categorySelect.hidden = true;
          productSelect.hidden = true;
          modelInput.hidden = false;
        }
      }

      function refreshPlanCatalogMode(plan, preserveValue = true) {
        if (!plan) return;
        plan.querySelectorAll(".row.data").forEach((row) => {
          if (row.classList.contains("promo")) return;
          syncChunghoControls(row, preserveValue);
        });
      }

      function refreshCatalogModes() {
        refreshPlanCatalogMode(document.querySelector('[data-plan="1"]'));
        refreshPlanCatalogMode(document.querySelector('[data-plan="2"]'));
      }

      function findCatalogMatches(queryKey) {
        if (!queryKey) return [];
        const matches = [];
        for (const entry of catalogEntries) {
          if (
            (entry.codeKey && entry.codeKey.includes(queryKey)) ||
            (entry.nameKey && entry.nameKey.includes(queryKey))
          ) {
            matches.push(entry);
            if (matches.length >= MAX_SUGGESTIONS) break;
          }
        }
        return matches;
      }

      function ensureSuggestionBox(row) {
        let box = row.querySelector(".model-suggestions");
        if (!box) {
          box = document.createElement("div");
          box.className = "model-suggestions";
          row.appendChild(box);
        }
        return box;
      }

      function hideSuggestions(row) {
        const box = row.querySelector(".model-suggestions");
        if (box) {
          box.style.display = "none";
          box.innerHTML = "";
        }
      }

      function applyCatalogEntry(row, entry) {
        const modelInput = row.querySelector(".model");
        const priceInput = row.querySelector(".price");
        if (!modelInput || !priceInput) return;
        modelInput.value = entry.modelCode || entry.modelName;
        priceInput.value = entry.price;
        updateAll();
        saveDraft();
      }

      function showSuggestions(row, input, entries) {
        const box = ensureSuggestionBox(row);
        const inputLeft = input.offsetLeft;
        const inputTop = input.offsetTop + input.offsetHeight + 4;
        box.style.left = `${inputLeft}px`;
        box.style.top = `${inputTop}px`;
        box.style.width = `${input.offsetWidth}px`;
        box.innerHTML = entries
          .map((entry, index) => {
            const title = entry.modelCode || entry.modelName || "";
            const priceLabel = formatWon(entry.price);
            const typeLabel = entry.priceType ? `(${entry.priceType})` : "";
            const nameLabel =
              entry.modelName && entry.modelName !== entry.modelCode
                ? entry.modelName
                : "";
            return `
              <button
                type="button"
                class="model-suggestion"
                data-index="${index}"
                data-code="${title}"
                data-name="${entry.modelName || ""}"
                data-price="${entry.price}"
              >
                <span>${title} ${typeLabel}</span>
                <span class="meta">${priceLabel}</span>
                ${nameLabel ? `<span class="meta">${nameLabel}</span>` : ""}
              </button>
            `;
          })
          .join("");
        box.dataset.count = entries.length;
        box.style.display = "flex";
        box._entries = entries;
      }

      function handleModelInput(input) {
        if (!catalogEntries.length) return;
        const row = input.closest(".row.data");
        if (!row) return;
        const priceInput = row.querySelector(".price");
        const queryKey = normalizeModel(input.value.trim());
        if (!queryKey && priceInput) {
          priceInput.value = "";
          updateAll();
        }
        if (queryKey.length < 2) {
          hideSuggestions(row);
          return;
        }
        const matches = findCatalogMatches(queryKey);
        if (!matches.length) {
          hideSuggestions(row);
          return;
        }
        showSuggestions(row, input, matches);
      }

      const DRAFT_STORAGE_KEY = "price_compare_draft_v1";
      const PENDING_REQUEST_KEY = "price_compare_pending_request_v1";
      const DEFAULT_REMARKS = "@상품명 클릭하시면 카달로그 페이지로 이동 합니다";
      const MIN_DEFAULT_ROWS = 3;
      const MAX_TEMPLATE_ROWS = 3;
      let allowDraftSave = false;
      let pendingDraft = null;
      let resumePrompted = false;

      function readDraft() {
        try {
          const raw = window.localStorage.getItem(DRAFT_STORAGE_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch (error) {
          return null;
        }
      }

      function writeDraft(draft) {
        window.localStorage.setItem(DRAFT_STORAGE_KEY, JSON.stringify(draft));
      }

      function clearDraft() {
        window.localStorage.removeItem(DRAFT_STORAGE_KEY);
      }

      function readPendingRequest() {
        try {
          const raw = window.sessionStorage.getItem(PENDING_REQUEST_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch (error) {
          return null;
        }
      }

      function writePendingRequest(payload) {
        try {
          window.sessionStorage.setItem(
            PENDING_REQUEST_KEY,
            JSON.stringify(payload)
          );
        } catch (error) {}
      }

      function clearPendingRequest() {
        try {
          window.sessionStorage.removeItem(PENDING_REQUEST_KEY);
        } catch (error) {}
      }

      function draftHasContent(draft) {
        if (!draft) return false;
        if (draft.recipient || draft.ext || draft.quote_date || draft.email || draft.remarks) {
          return true;
        }
        if (draft.mode) return true;
        if ((draft.plan1?.rows || []).length) return true;
        if ((draft.plan2?.rows || []).length) return true;
        return false;
      }

      function getActiveMode() {
        return document.querySelector(".mode-switch button.active")?.dataset.mode || "compare";
      }

      function collectDraft() {
        const recipient = document.getElementById("quote-recipient")?.value.trim() ?? "";
        const ext = document.getElementById("quote-ext")?.value.trim() ?? "";
        const quoteDate = document.getElementById("quote-date")?.value ?? "";
        const email = document.getElementById("quote-email")?.value.trim() ?? "";
        const remarks = document.getElementById("quote-remarks")?.value.trim() ?? "";
        const mode = getActiveMode();
        const plan1El = document.querySelector('[data-plan="1"]');
        const plan2El = document.querySelector('[data-plan="2"]');
        const plan1 = collectPlanData(plan1El, "기존 요금");
        const plan2 = collectPlanData(plan2El, "제안 요금");
        return {
          mode,
          recipient,
          ext,
          quote_date: quoteDate,
          email,
          remarks,
          plan1,
          plan2,
          discount1: getDiscount(plan1El),
          discount2: getDiscount(plan2El),
        };
      }

      function saveDraft() {
        if (!allowDraftSave) return;
        const draft = collectDraft();
        if (draftHasContent(draft)) {
          writeDraft(draft);
        } else {
          clearDraft();
        }
      }

      function rememberPendingRequest(action) {
        writePendingRequest({
          action,
          view:
            document.querySelector(".menu button.active")?.dataset.view || "price",
          draft: collectDraft(),
          savedAt: Date.now(),
        });
      }

      function resetPlan(plan) {
        const table = plan.querySelector(".table");
        if (!table) return;
        table.querySelectorAll(".row.data").forEach((row) => row.remove());
        plan.dataset.promoEnabled = "false";
        const promoButton = plan.querySelector("[data-promo-toggle]");
        if (promoButton) {
          promoButton.classList.remove("is-active");
        }
        for (let i = 0; i < MIN_DEFAULT_ROWS; i += 1) {
          table.appendChild(createRow());
        }
        const firstRadio = plan.querySelector('.prepay input[type="radio"]');
        if (firstRadio) {
          firstRadio.checked = true;
        }
      }

      function applyPlanData(plan, rows, discountValue) {
        const table = plan.querySelector(".table");
        if (!table) return;
        table.querySelectorAll(".row.data").forEach((row) => row.remove());
        const totalRows = Math.min(
          Math.max(rows.length, MIN_DEFAULT_ROWS),
          MAX_TEMPLATE_ROWS
        );
        for (let i = 0; i < totalRows; i += 1) {
          const row = createRow();
          const data = rows[i];
          if (data) {
            row.querySelector(".model").value = data.model ?? "";
            row.querySelector(".price").value = data.price ?? "";
            row.querySelector(".qty").value = data.qty ?? "";
          }
          table.appendChild(row);
        }
        refreshPlanCatalogMode(plan);
        const radio = plan.querySelector(
          `.prepay input[type="radio"][value="${discountValue}"]`
        );
        if (radio) {
          radio.checked = true;
        }
      }

      function applyDraft(draft) {
        if (!draft) return;
        const recipientInput = document.getElementById("quote-recipient");
        const extInput = document.getElementById("quote-ext");
        const dateInput = document.getElementById("quote-date");
        const emailInput = document.getElementById("quote-email");
        const remarksInput = document.getElementById("quote-remarks");
        if (recipientInput) recipientInput.value = draft.recipient ?? "";
        if (extInput) extInput.value = draft.ext ?? "";
        if (dateInput) dateInput.value = draft.quote_date ?? "";
        if (emailInput) emailInput.value = draft.email ?? "";
        if (remarksInput) remarksInput.value = draft.remarks ?? "";
        applyMode(draft.mode ?? "compare");
        const plan1El = document.querySelector('[data-plan="1"]');
        const plan2El = document.querySelector('[data-plan="2"]');
        if (plan1El) {
          applyPlanData(plan1El, draft.plan1?.rows || [], draft.discount1 ?? "0");
        }
        if (plan2El) {
          applyPlanData(plan2El, draft.plan2?.rows || [], draft.discount2 ?? "0");
        }
        refreshPlanCatalogMode(plan1El);
        refreshPlanCatalogMode(plan2El);
        updateAll();
      }

      function clearForm() {
        const currentMode = getActiveMode();
        allowDraftSave = false;
        pendingDraft = null;
        clearDraft();
        clearPendingRequest();
        closeResumeModal();
        stopPdfProgress(true, "");
        setJobStatus("", "");
        const recipientInput = document.getElementById("quote-recipient");
        const extInput = document.getElementById("quote-ext");
        const dateInput = document.getElementById("quote-date");
        const emailInput = document.getElementById("quote-email");
        const remarksInput = document.getElementById("quote-remarks");
        if (recipientInput) recipientInput.value = "";
        if (extInput) extInput.value = "";
        if (dateInput) dateInput.value = "";
        if (emailInput) emailInput.value = "";
        if (remarksInput) remarksInput.value = DEFAULT_REMARKS;
        applyMode(currentMode);
        const plan1El = document.querySelector('[data-plan="1"]');
        const plan2El = document.querySelector('[data-plan="2"]');
        if (plan1El) resetPlan(plan1El);
        if (plan2El) resetPlan(plan2El);
        refreshCatalogModes();
        updateAll();
        clearDraft();
        allowDraftSave = true;
      }

      function openResumeModal(draft) {
        const modal = document.getElementById("resume-modal");
        const message = document.getElementById("resume-message");
        if (!modal || !message) return;
        const recipientLabel = draft?.recipient ? `(${draft.recipient})` : "";
        message.textContent = `이전 계약 안내 기록${recipientLabel}이 있습니다. 이어서 안내할까요?`;
        modal.classList.add("is-open");
        modal.setAttribute("aria-hidden", "false");
      }

      function closeResumeModal() {
        const modal = document.getElementById("resume-modal");
        if (!modal) return;
        modal.classList.remove("is-open");
        modal.setAttribute("aria-hidden", "true");
      }

      function maybePromptResume() {
        if (resumePrompted) return;
        const draft = readDraft();
        if (!draftHasContent(draft)) {
          allowDraftSave = true;
          resumePrompted = true;
          return;
        }
        pendingDraft = draft;
        resumePrompted = true;
        openResumeModal(draft);
        if (draft) {
          applyDraft(draft);
        }
      }

      function getDiscount(plan) {
        const checked = plan.querySelector('.prepay input[type="radio"]:checked');
        if (!checked) return 0;
        return Number(checked.value || 0);
      }

      function isBaseRowReady(row) {
        const price = parseNumber(row.querySelector(".price")?.value);
        const qty = parseNumber(row.querySelector(".qty")?.value);
        return price > 0 && qty > 0;
      }

      function getPromoRow(baseRow) {
        const next = baseRow.nextElementSibling;
        if (next && next.classList.contains("promo")) {
          return next;
        }
        return null;
      }

      function syncPromoRow(baseRow) {
        const plan = baseRow.closest(".plan");
        if (!plan || plan.dataset.plan !== "2") return;
        const promoEnabled = plan.dataset.promoEnabled === "true";
        const promoRow = getPromoRow(baseRow);

        if (!promoEnabled || !isBaseRowReady(baseRow)) {
          if (promoRow) promoRow.remove();
          return;
        }

        let row = promoRow;
        if (!row) {
          row = createPromoRow();
          baseRow.insertAdjacentElement("afterend", row);
        }

        const qty = parseNumber(baseRow.querySelector(".qty").value);
        const priceInput = row.querySelector(".promo-price");
        const qtyInput = row.querySelector(".promo-qty");
        priceInput.disabled = false;
        qtyInput.value = qty ? qty : "";

        const price = parseNumber(baseRow.querySelector(".price").value);
        const promoPrice = parseNumber(priceInput.value);
        row.querySelector(".row-total-value").textContent = formatWon(promoPrice * qty);
        const diffValue = (price - promoPrice) * qty;
        const diffEl = row.querySelector(".promo-diff");
        if (diffEl) {
          diffEl.textContent = formatWon(diffValue);
        }
      }

      function syncPromotionRows(plan) {
        if (!plan || plan.dataset.plan !== "2") return;
        plan.querySelectorAll(".row.data").forEach((row) => {
          if (row.classList.contains("promo")) return;
          syncPromoRow(row);
        });
      }

      function updatePromoToggleState(plan) {
        if (!plan || plan.dataset.plan !== "2") return;
        const promoBtn = plan.querySelector("[data-promo-toggle]");
        if (!promoBtn) return;
        const hasReadyRow = Array.from(plan.querySelectorAll(".row.data")).some((row) => {
          if (row.classList.contains("promo")) return false;
          return isBaseRowReady(row);
        });
        promoBtn.disabled = !hasReadyRow;
      }

      function updatePlan(plan) {
        let sum = 0;
        const isPromoPlan = plan?.dataset.plan === "2";
        const promoEnabled = isPromoPlan && plan.dataset.promoEnabled === "true";
        const totalLabel = plan?.querySelector(".total-label");
        if (totalLabel) {
          if (isPromoPlan) {
            totalLabel.textContent = promoEnabled ? "프로모션적용" : "총액";
          } else {
            totalLabel.textContent = "총액";
          }
        }
        const rows = plan.querySelectorAll(".row.data");
        rows.forEach((row) => {
          if (row.classList.contains("promo")) return;
          const price = parseNumber(row.querySelector(".price").value);
          const qty = parseNumber(row.querySelector(".qty").value);
          const total = price * qty;
          const totalEl = row.querySelector(".row-total-value") || row.querySelector(".row-total");
          totalEl.textContent = formatWon(total);
          if (promoEnabled) {
            const promoRow = getPromoRow(row);
            if (promoRow) {
              const promoPrice = parseNumber(
                promoRow.querySelector(".promo-price")?.value
              );
              const promoTotal = promoPrice * qty;
              const diffValue = (price - promoPrice) * qty;
              const diffEl = promoRow.querySelector(".promo-diff");
              if (diffEl) {
                diffEl.textContent = formatWon(diffValue);
              }
              const promoTotalEl =
                promoRow.querySelector(".row-total-value") ||
                promoRow.querySelector(".row-total");
              promoTotalEl.textContent = formatWon(promoTotal);
              sum += promoTotal;
            }
          } else {
            sum += total;
          }
        });
        const discount = getDiscount(plan);
        const discountedTotal = Math.round(sum * (1 - discount));
        plan.querySelector("[data-total]").textContent = formatWon(discountedTotal);
        return discountedTotal;
      }

            `<span class="summary-point">${formatWon(diff)}</span> ` +
            `<span class="summary-label-discount">할인</span>` +

          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");

      function collectPlanData(plan, label) {
        if (!plan) return { label, rows: [], total: 0 };
        const rows = [];
        const promoEnabled = plan.dataset.plan === "2" && plan.dataset.promoEnabled === "true";
        plan.querySelectorAll(".row.data").forEach((row) => {
          if (row.classList.contains("promo")) return;
          const model = row.querySelector(".model").value.trim();
          const price = parseNumber(row.querySelector(".price").value);
          const qty = parseNumber(row.querySelector(".qty").value);
          let promoPrice = null;
          if (promoEnabled) {
            const promoRow = getPromoRow(row);
            if (promoRow) {
              promoPrice = parseNumber(promoRow.querySelector(".promo-price")?.value);
            }
          }
          if (!model && !price && !qty) return;
          rows.push({
            model,
            price,
            qty,
            total: price * qty,
            promo_price: promoPrice,
          });
        });
        const total = parseNumber(plan.querySelector("[data-total]").textContent);
        return { label, rows, total, promo_enabled: promoEnabled };
      }

      function csvEscape(value) {
        const text = String(value ?? "");
        if (/[",\r\n]/.test(text)) {
          return `"${text.replace(/"/g, '""')}"`;
        }
        return text;
      }

      function buildCsvRows() {
        const recipientInput = document.getElementById("quote-recipient");
        const recipientName = recipientInput ? recipientInput.value.trim() : "";
        const recipientLabel = recipientName ? `${recipientName} 귀하` : "";
        const ext = document.getElementById("quote-ext")?.value.trim() ?? "";

        const monthlyJudge =
          diff === 0

              : `제안 요금이 월 ${format.format(diff)}원 추가`;
        const yearlyJudge =
          diffYear === 0
            ? "차이 없음"
            : diffYear < 0
              ? `제안 요금이 연 ${format.format(Math.abs(diffYear))}원 할인`
              : `제안 요금이 연 ${format.format(diffYear)}원 추가`;

        const rows = [];
        rows.push(["구분", "항목", "값"]);
        rows.push(["견적정보", "수신", recipientLabel]);
        rows.push(["견적정보", "내선번호", ext]);
        rows.push(["견적정보", "견적일", quoteDate]);
        rows.push(["견적정보", "이메일", email]);
        rows.push(["견적정보", "모드", isSingle ? "단일견적서" : "비교견적서"]);
        rows.push([]);
        rows.push(["구분", "안", "모델", "가격", "대수", "총가격"]);
        plan1.rows.forEach((item) => {
          rows.push(["제품", "기존 요금", item.model, item.price, item.qty, item.total]);
        });
        if (!isSingle) {
          plan2.rows.forEach((item) => {
            rows.push(["제품", "제안 요금", item.model, item.price, item.qty, item.total]);
          });
          rows.push([]);
          rows.push(["요약", "항목", "기존 요금", "제안 요금", "차이(제안-기존)", "판단"]);
          rows.push(["요약", "월 총액", plan1.total, plan2.total, diff, monthlyJudge]);
          rows.push([
            "요약",
            "연 환산",
            plan1.total * 12,
            plan2.total * 12,
            diffYear,
            yearlyJudge,
          ]);
        } else {
          rows.push([]);
          rows.push(["요약", "항목", "단일 견적서", "", "", ""]);
          rows.push(["요약", "월 총액", plan1.total, "", "", ""]);
          rows.push(["요약", "연 환산", plan1.total * 12, "", "", ""]);
        }
        return rows;
      }

      function sanitizeFileNamePart(text) {
        return String(text || "")
          .replace(/[\\/:*?"<>|]/g, "_")
          .replace(/\s+/g, "");
      }

      function formatKoreanDate(inputValue) {
        if (!inputValue) {
          const now = new Date();
          const month = String(now.getMonth() + 1).padStart(2, "0");
          const day = String(now.getDate()).padStart(2, "0");
          return `${month}월${day}일`;
        }
        const parts = inputValue.split("-");
        if (parts.length !== 3) return inputValue;
        const month = parts[1].padStart(2, "0");
        const day = parts[2].padStart(2, "0");
        return `${month}월${day}일`;
      }

      function setPdfProgressState(title, text, widthPercent) {
        const titleEl = document.getElementById("pdf-progress-title");
        const textEl = document.getElementById("pdf-progress-text");
        const barEl = document.getElementById("pdf-progress-bar");
        if (titleEl) titleEl.textContent = title;

      function setJobStatus(kind, message) {
        const statusEl = document.getElementById("job-status");
        if (!statusEl) return;
        statusEl.classList.remove("is-error", "is-success", "is-visible");
        if (!message) {
          statusEl.textContent = "";
          return;
        }
        statusEl.textContent = message;
        statusEl.classList.add("is-visible");
        statusEl.classList.add(kind === "error" ? "is-error" : "is-success");
      }

      function setQuoteJobStatus(kind, message) {
        const statusEl = document.getElementById("quote-job-status");
        if (!statusEl) return;
        statusEl.classList.remove("is-error", "is-success", "is-visible");
        statusEl.textContent = message || "";
        if (!message) return;
        statusEl.classList.add("is-visible");
        statusEl.classList.add(kind === "error" ? "is-error" : "is-success");
      }

      function updatePdfProgressElapsed(elapsedSeconds) {
        const elapsedEl = document.getElementById("pdf-progress-elapsed");
        if (!elapsedEl) return;
        elapsedEl.textContent = `${elapsedSeconds}초 경과`;
      }

      function tickPdfProgress() {
        if (!pdfProgressStartedAt) return;
        const elapsedSeconds = Math.floor((Date.now() - pdfProgressStartedAt) / 1000);
        updatePdfProgressElapsed(elapsedSeconds);
        if (elapsedSeconds < 3) {
          setPdfProgressState("PDF 생성 중", "요청을 전송하는 중입니다.", 12);
          return;
        }
        if (elapsedSeconds < 15) {
          setPdfProgressState("PDF 생성 중", "엑셀 데이터를 정리하고 있습니다.", 28);
          return;
        }
        if (elapsedSeconds < 45) {
          setPdfProgressState("PDF 생성 중", "엑셀을 PDF로 변환하는 중입니다.", 56);
          return;
        }
        if (elapsedSeconds < 90) {
          setPdfProgressState("PDF 생성 중", "이미지와 견적서를 하나의 PDF로 합치는 중입니다.", 82);
          return;
        }
        setPdfProgressState("PDF 생성 지연", "90초 이상 걸리고 있습니다. Excel 변환이 지연 중일 수 있습니다.", 94);
      }

      function startPdfProgress() {
        const modal = document.getElementById("pdf-progress");
        const exportBtn = document.getElementById("export-csv");
        const quoteSend = document.getElementById("quote-send");
        if (modal) modal.style.display = "flex";
        if (exportBtn) exportBtn.disabled = true;
        if (quoteSend) quoteSend.disabled = true;
        setJobStatus("", "");
        pdfProgressStartedAt = Date.now();
        tickPdfProgress();
        if (pdfProgressTimer) {
          clearInterval(pdfProgressTimer);
        }
        pdfProgressTimer = setInterval(tickPdfProgress, 1000);
      }

      function stopPdfProgress(success, message) {
        const modal = document.getElementById("pdf-progress");
        const exportBtn = document.getElementById("export-csv");
        const quoteSend = document.getElementById("quote-send");
        if (pdfProgressTimer) {
          clearInterval(pdfProgressTimer);
          pdfProgressTimer = null;
        }
        pdfProgressStartedAt = 0;
        if (exportBtn) exportBtn.disabled = false;
        if (quoteSend) quoteSend.disabled = false;
        if (modal) modal.style.display = "none";
        const finalMessage = message || (success ? "PDF 생성이 완료되었습니다." : "작업이 실패했습니다.");
        setJobStatus(success ? "success" : "error", finalMessage);
      }

          saveDraft();
        }
      });

      document.addEventListener("focusin", (event) => {
        if (!(event.target instanceof HTMLElement)) return;
        if (!event.target.classList.contains("model")) return;
        handleModelInput(event.target);
      });

      document.addEventListener("mousedown", (event) => {
        const button = event.target.closest(".model-suggestion");
        if (!button) return;
        event.preventDefault();
        const row = button.closest(".row.data");
        const box = button.closest(".model-suggestions");
        if (!row || !box || !box._entries) return;
        const index = Number(button.dataset.index);
        const entry = box._entries[index];
        if (entry) {
          applyCatalogEntry(row, entry);
        }
        hideSuggestions(row);
      });

      document.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.closest(".model-suggestions")) return;
        if (target.classList.contains("model")) return;
        document.querySelectorAll(".model-suggestions").forEach((box) => {
          box.style.display = "none";
        });
      });

      setDefaultQuoteDate();
      applyMode("compare");
      requestAnimationFrame(refreshCatalogModes);
      let pendingRequest = readPendingRequest();
      if (
        pendingRequest?.savedAt &&
        Date.now() - Number(pendingRequest.savedAt) > 5 * 60 * 1000
      ) {
        clearPendingRequest();
        pendingRequest = null;
      }
      const savedView = pendingRequest?.view || window.initialView || "price";
      setView(savedView);
      if (pendingRequest?.draft && draftHasContent(pendingRequest.draft)) {
        allowDraftSave = true;
        resumePrompted = true;
        applyDraft(pendingRequest.draft);
        if (pendingRequest.action === "download_pdf" || pendingRequest.action === "send_email") {
          startPdfProgress();
        }
      } else {
        updateAll();
        maybePromptResume();
      }
    </script>
  </body>
</html>
