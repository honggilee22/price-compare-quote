<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      #frame-wrapper {
        width: 100%;
        height: 100%;
        overflow: auto;
      }

      #frame {
        border: 0;
        display: block;
      }
    </style>
    <script src="streamlit-component-lib.js"></script>
  </head>
  <body>
    <div id="frame-wrapper">
      <iframe id="frame"></iframe>
    </div>

    <script>
      const frame = document.getElementById("frame");
      let lastResponseId = null;
      let currentHash = null;
      let pendingResponse = null;
      let frameLoaded = false;
      let responseRetryTimer = null;

      function deliverResponseToFrame() {
        if (!pendingResponse || !frameLoaded || !frame || !frame.contentWindow) return;
        frame.contentWindow.postMessage(
          { source: "price-compare-response", payload: pendingResponse },
          "*"
        );
        if (!responseRetryTimer) {
          responseRetryTimer = setInterval(() => {
            if (!pendingResponse) {
              clearInterval(responseRetryTimer);
              responseRetryTimer = null;
              return;
            }
            deliverResponseToFrame();
          }, 500);
        }
      }

      frame.addEventListener("load", () => {
        frameLoaded = true;
        deliverResponseToFrame();
      });

      function handleRender(event) {
        const data = event.detail;
        const args = data.args || {};
        if (args.html && args.html_hash && args.html_hash !== currentHash) {
          currentHash = args.html_hash;
          frameLoaded = false;
          frame.srcdoc = args.html;
        }
        const contentWidth = args.content_width || args.width;
        const contentHeight = args.content_height || args.height;
        if (contentWidth) {
          frame.style.width = `${contentWidth}px`;
        } else {
          frame.style.width = "100%";
        }
        if (contentHeight) {
          frame.style.height = `${contentHeight}px`;
        } else {
          frame.style.height = "100%";
        }
        if (args.height) {
          Streamlit.setFrameHeight(args.height);
        } else {
          Streamlit.setFrameHeight();
        }

        const response = args.response;
        if (response && response.id && response.id !== lastResponseId) {
          lastResponseId = response.id;
          pendingResponse = response;
          deliverResponseToFrame();
          if (response.type === "pdf") {
            const link = document.createElement("a");
            link.href = `data:application/pdf;base64,${response.content}`;
            link.download = response.filename || "quote.pdf";
            document.body.appendChild(link);
            link.click();
            link.remove();
          }
        }
      }

      Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, handleRender);
      Streamlit.setComponentReady();
      Streamlit.setFrameHeight();

      window.addEventListener("message", (event) => {
        if (!event.data) return;
        if (event.data.source === "price-compare-response-ack") {
          const responseId = event.data.response_id;
          if (!responseId) return;
          if (pendingResponse && pendingResponse.id === responseId) {
            pendingResponse = null;
          }
          if (responseRetryTimer) {
            clearInterval(responseRetryTimer);
            responseRetryTimer = null;
          }
          Streamlit.setComponentValue({
            action: "ack_response",
            response_id: responseId,
            request_id: `ack-${responseId}`,
          });
          return;
        }
        if (event.data.source === "price-compare") {
          Streamlit.setComponentValue(event.data.payload);
        }
      });
    </script>
  </body>
</html>
